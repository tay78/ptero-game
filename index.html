<div class = "miniGame1">
<style>
    body {

<h1>Drag the 5 Brown Boxes Into the Red Box</h1>

<button id="startBtn">Start Game</button>

<div id="gameArea">
    <div id="timer">10</div>

    <div id="boxesContainer">
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
    </div>

    <div id="target"></div>

    <div id="message"></div>
</div>

<script>
const startBtn = document.getElementById("startBtn");
const gameArea = document.getElementById("gameArea");
const timerDisplay = document.getElementById("timer");
const target = document.getElementById("target");
const message = document.getElementById("message");

let timeLeft = 10;
let timer;
let completed = 0;
let gameRunning = false;

startBtn.addEventListener("click", startGame);

function startGame() {
    startBtn.style.display = "none";
    gameArea.style.display = "block";

    timeLeft = 10;
    completed = 0;
    gameRunning = true;
    message.textContent = "";

    timerDisplay.textContent = timeLeft;

    timer = setInterval(() => {
        timeLeft--;
        timerDisplay.textContent = timeLeft;

        if (timeLeft <= 0) {
            clearInterval(timer);

            if (completed < 5) {
                gameRunning = false;
                message.textContent = "Sorry Incomplete";
                message.style.color = "red";
            }
        }
    }, 1000);

    initializeDragging();
}

function initializeDragging() {
    document.querySelectorAll(".box").forEach(box => {

        if (box.dataset.initialized) return;
        box.dataset.initialized = true;

        let offsetX = 0;
        let offsetY = 0;

        box.addEventListener("pointerdown", (e) => {
            if (!gameRunning || box.dataset.done) return;

            e.preventDefault();

            const rect = box.getBoundingClientRect();

            offsetX = e.clientX - rect.left;
            offsetY = e.clientY - rect.top;

            box.style.position = "fixed";
            box.style.zIndex = "1000";

            function moveHandler(ev) {
                box.style.left = (ev.clientX - offsetX) + "px";
                box.style.top = (ev.clientY - offsetY) + "px";
            }

            function upHandler() {
                document.removeEventListener("pointermove", moveHandler);
                document.removeEventListener("pointerup", upHandler);

                const boxRect = box.getBoundingClientRect();
                const targetRect = target.getBoundingClientRect();

                const inside =
                    boxRect.left > targetRect.left &&
                    boxRect.right < targetRect.right &&
                    boxRect.top > targetRect.top &&
                    boxRect.bottom < targetRect.bottom;

                if (inside) {
                    box.dataset.done = "true";
                    box.style.background = "#654321";
                    box.style.pointerEvents = "none";

                    target.appendChild(box);

                    box.style.position = "absolute";
                    box.style.left =
                        Math.random() * (target.clientWidth - 70) + "px";
                    box.style.top =
                        Math.random() * (target.clientHeight - 70) + "px";

                    completed++;

                    if (completed === 5) {
                        clearInterval(timer);
                        gameRunning = false;
                        message.textContent = "You Win!";
                        message.style.color = "green";
                        winButton.style.display ="block";
                    }
                }
            }

            document.addEventListener("pointermove", moveHandler);
            document.addEventListener("pointerup", upHandler);
        });
    });
}
</script>

<div class="miniGame2">
<style>
  #startBtn2, #restartBtn2 {

  }

  .circle {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: dodgerblue;
    position: absolute;
    cursor: pointer;

  }

  #message2 {
    font-size: 28px;
    font-weight: bold;

  }
</style>

<h1>Click All Circles!</h1>

<button id="startBtn2">Start Game</button>
<button id="restartBtn2" style="display:none;">Restart</button>

<div id="timer2">20</div>
<div id="gameArea2"></div>
<div id="message2"></div>

<script>
(() => {
  const startBtn2 = document.getElementById("startBtn2");
  const restartBtn2 = document.getElementById("restartBtn2");
  const gameArea2 = document.getElementById("gameArea2");
  const timer2 = document.getElementById("timer2");
  const message2 = document.getElementById("message2");

  let circles = [];
  let velocities = [];
  let timeLeft2 = 20;
  let timerInterval2;
  let animationId;
  let gameRunning2 = false;

  startBtn2.addEventListener("click", startGame2);
  restartBtn2.addEventListener("click", restartGame2);

  function startGame2() {
    startBtn2.style.display = "none";
    restartBtn2.style.display = "none";

    gameArea2.style.display = "block";
    message2.textContent = "";

    resetGame2();
    runGame2();
  }

  function restartGame2() {
    resetGame2();
    runGame2();
  }

  function resetGame2() {
    clearInterval(timerInterval2);
    cancelAnimationFrame(animationId);

    timeLeft2 = 20;
    timer2.textContent = timeLeft2;

    gameRunning2 = true;

    gameArea2.innerHTML = "";
    circles = [];
    velocities = [];

    for (let i = 0; i < 5; i++) {
      const c = document.createElement("div");
      c.classList.add("circle");

      const x = Math.random() * (gameArea2.clientWidth - 60);
      const y = Math.random() * (gameArea2.clientHeight - 60);

      c.style.left = x + "px";
      c.style.top = y + "px";

      gameArea2.appendChild(c);
      circles.push(c);

      velocities.push({
        vx: (Math.random() * 4 + 2) * (Math.random() < 0.5 ? -1 : 1),
        vy: (Math.random() * 4 + 2) * (Math.random() < 0.5 ? -1 : 1)
      });

      c.addEventListener("pointerdown", () => {
        if (!gameRunning2) return;

        const index = circles.indexOf(c);
        if (index > -1) {
          circles.splice(index, 1);
          velocities.splice(index, 1);
        }

        c.remove();

        if (circles.length === 0) {
          endGame2(true);
        }
      });
    }
  }

  function runGame2() {
    timerInterval2 = setInterval(() => {
      timeLeft2--;
      timer2.textContent = timeLeft2;

      if (timeLeft2 <= 0) {
        endGame2(false);
      }
    }, 1000);

    animateCircles();
  }

  function animateCircles() {
    const w = gameArea2.clientWidth;
    const h = gameArea2.clientHeight;

    circles.forEach((c, i) => {
      let x = parseFloat(c.style.left);
      let y = parseFloat(c.style.top);

      x += velocities[i].vx;
      y += velocities[i].vy;

      if (x <= 0 || x >= w - 60) velocities[i].vx *= -1;
      if (y <= 0 || y >= h - 60) velocities[i].vy *= -1;

      c.style.left = x + "px";
      c.style.top = y + "px";
    });

    if (gameRunning2) {
      animationId = requestAnimationFrame(animateCircles);
    }
  }

  function endGame2(win) {
    gameRunning2 = false;
    clearInterval(timerInterval2);
    cancelAnimationFrame(animationId);

    restartBtn2.style.display = "inline-block";

    if (win) {
      message2.textContent = "You Win!";
      message2.style.color = "green";
          youWinButton2.style.display ="block";

    } else {
      message2.textContent = "Time's up! You Lose!";
      message2.style.color = "red";
    }
  }
})();
</script>

<h1>Type the Word pterodactyl as fast as you can!</h1>

<button id="startBtn3">Start Game</button>
<button id="restartBtn3" style="display:none;">Restart</button>

<div id="gameArea3">
  <div id="timer3">5</div>

  <p>Type this word:</p>
  <h2>pterodactyl</h2>

  <input id="input3" type="text" placeholder="Type here..." />

  <div id="message3"></div>
</div>

<script>
(() => {
  const startBtn3 = document.getElementById("startBtn3");
  const restartBtn3 = document.getElementById("restartBtn3");
  const gameArea3 = document.getElementById("gameArea3");
  const timer3 = document.getElementById("timer3");
  const input3 = document.getElementById("input3");
  const message3 = document.getElementById("message3");

  let timeLeft3 = 5;
  let timerInterval3;
  let gameRunning3 = false;

  const targetWord = "pterodactyl";

  startBtn3.addEventListener("click", startGame3);
  restartBtn3.addEventListener("click", restartGame3);

  function startGame3() {
    startBtn3.style.display = "none";
    restartBtn3.style.display = "none";

    gameArea3.style.display = "block";
    message3.textContent = "";

    resetGame3();
  }

  function restartGame3() {
    resetGame3();
  }

  function resetGame3() {
    clearInterval(timerInterval3);

    timeLeft3 = 5;
    timer3.textContent = timeLeft3;

    input3.value = "";
    input3.disabled = false;
    input3.focus();

    gameRunning3 = true;

    timerInterval3 = setInterval(() => {
      timeLeft3--;
      timer3.textContent = timeLeft3;

      if (timeLeft3 <= 0) {
        endGame3(false);
      }
    }, 1000);
  }

  input3.addEventListener("input", () => {
    if (!gameRunning3) return;

    if (input3.value.trim().toLowerCase() === targetWord) {
      endGame3(true);
    }
  });

  function endGame3(win) {
    gameRunning3 = false;
    clearInterval(timerInterval3);
    input3.disabled = true;

    restartBtn3.style.display = "inline-block";

    if (win) {
      message3.textContent = "You Win!";
      message3.style.color = "green";
        youWinButton3.style.display ="block";
    } else {
      message3.textContent = "Too slow! You Lose!";
      message3.style.color = "red";
    }
  }
})();
</script>
